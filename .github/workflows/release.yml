name: Build & Publish package repos

on:
  push:
    branches: [main]
    tags:     ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y git cmake libncurses-dev dpkg-dev apt-utils build-essential

      - name: Build .deb
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DMDSYS_STATIC_LIBCXX=OFF
          cmake --build build -j$(nproc)
          cd build && cpack -G DEB

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: build/*.deb

  build-rpm:
    runs-on: ubuntu-22.04
    container:
      image: almalinux:8
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y epel-release || true
          dnf install -y gcc-c++ cmake ncurses-devel systemd less rpm-build

      - name: Build .rpm
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DMDSYS_STATIC_LIBCXX=OFF
          cmake --build build -j$(nproc)
          cd build && cpack -G RPM

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: build/*.rpm

  build-arch:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm base-devel cmake ncurses systemd less

      - name: Build Arch package
        run: |
          useradd -m builder
          cp packaging/arch/PKGBUILD .
          chown -R builder:builder .
          su builder -c "makepkg -sf --noconfirm"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arch
          path: mdsys-*.pkg.tar.zst

  publish:
    needs: [build-deb, build-rpm, build-arch]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/deb/*.deb
            artifacts/rpm/*.rpm
            artifacts/arch/*.pkg.tar.zst

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Init gh-pages if missing
        run: |
          if [ ! -d gh-pages/.git ]; then
            rm -rf gh-pages
            mkdir gh-pages
            cd gh-pages
            git init
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout -b gh-pages
          fi

      - name: Install repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils createrepo-c

      - name: Publish apt repo (Debian/Ubuntu)
        run: |
          mkdir -p gh-pages/pool/main
          cp artifacts/deb/*.deb gh-pages/pool/main/
          cd gh-pages
          dpkg-scanpackages --multiversion pool/ > Packages
          gzip -k -f Packages
          cat > Release <<EOF
          Origin: mdsys
          Label: mdsys
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: mdsys apt repository
          EOF
          apt-ftparchive release . >> Release || true

      - name: Publish dnf/yum repo (Fedora, AlmaLinux, CentOS)
        run: |
          mkdir -p gh-pages/rpm
          cp artifacts/rpm/*.rpm gh-pages/rpm/
          createrepo_c gh-pages/rpm

      - name: Publish pacman repo (Arch Linux)
        run: |
          mkdir -p gh-pages/arch
          cp artifacts/arch/*.pkg.tar.zst gh-pages/arch/
          docker run --rm -v "$GITHUB_WORKSPACE/gh-pages/arch:/repo" archlinux:latest \
            bash -c "pacman -Sy --noconfirm pacman-contrib && cd /repo && repo-add mdsys.db.tar.gz *.pkg.tar.zst"

      - name: Write install page
        run: |
          cat > gh-pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>mdsys packages</title>
            <style>
              body{font-family:monospace;max-width:820px;margin:40px auto;background:#0d1117;color:#c9d1d9;line-height:1.5}
              h1,h2{color:#58a6ff} pre{background:#161b22;padding:16px;border-radius:6px;overflow-x:auto}
              a{color:#79c0ff}
            </style>
          </head>
          <body>
            <h1>mdsys — systemd TUI manager</h1>
            <p>Source: <a href="https://github.com/hdmain/mdsys">github.com/hdmain/mdsys</a></p>

            <h2>Debian / Ubuntu (apt)</h2>
            <pre>echo "deb [trusted=yes] https://hdmain.github.io/mdsys ./" \
              | sudo tee /etc/apt/sources.list.d/mdsys.list
            sudo apt update
            sudo apt install mdsys</pre>

            <h2>Fedora / AlmaLinux / CentOS (dnf)</h2>
            <pre>sudo tee /etc/yum.repos.d/mdsys.repo &lt;&lt;'REPO'
            [mdsys]
            name=mdsys
            baseurl=https://hdmain.github.io/mdsys/rpm
            enabled=1
            gpgcheck=0
            REPO
            sudo dnf install mdsys</pre>

            <h2>Arch Linux (pacman)</h2>
            <pre>sudo tee -a /etc/pacman.conf &lt;&lt;'REPO'

            [mdsys]
            SigLevel = Optional TrustAll
            Server = https://hdmain.github.io/mdsys/arch/
            REPO
            sudo pacman -Sy mdsys</pre>
          </body>
          </html>
          EOF

      - name: Commit & push gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "packages: deb rpm arch"
          git push origin HEAD:gh-pages --force
