<h1>mdsys — systemd TUI manager</h1>
<p>Install via apt:</p>
<pre>echo "deb [trusted=yes] https://hdmain.github.io/mdsys ./" \
  | sudo tee /etc/apt/sources.list.d/mdsys.list
sudo apt update
sudo apt install mdsys</pre>
